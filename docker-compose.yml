version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: portfolio-backend
    restart: unless-stopped
    environment:
      - PORT=3001
      - JWT_SECRET=${JWT_SECRET:-portfolio-secret-key-2026}
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${POSTGRES_USER:-postgres}
      - DB_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - DB_NAME=${POSTGRES_DB:-portfolio}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@portfolio.local}
      - ADMIN_NAME=${ADMIN_NAME:-Portfolio Admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-ChangeMe123!}
    volumes:
      - ./backend/uploads:/app/uploads
    networks:
      - portfolio-network
    depends_on:
      postgres:
        condition: service_healthy
      seed:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3001/api/v1/portfolio"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: portfolio-frontend
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - portfolio-network

  nginx:
    image: nginx:alpine
    container_name: portfolio-nginx
    restart: unless-stopped
    ports:
      - "${PORT:-80}:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - portfolio-network

  seed:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: portfolio-seed
    command: ["npm", "run", "seed"]
    restart: "no"
    environment:
      - PORT=3001
      - JWT_SECRET=${JWT_SECRET:-portfolio-secret-key-2026}
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${POSTGRES_USER:-postgres}
      - DB_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - DB_NAME=${POSTGRES_DB:-portfolio}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@portfolio.local}
      - ADMIN_NAME=${ADMIN_NAME:-Portfolio Admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-ChangeMe123!}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - portfolio-network

  postgres:
    image: postgres:16-alpine
    container_name: portfolio-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=${POSTGRES_DB:-portfolio}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-portfolio}"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - pg-data:/var/lib/postgresql/data
    networks:
      - portfolio-network

networks:
  portfolio-network:
    driver: bridge

volumes:
  pg-data:
